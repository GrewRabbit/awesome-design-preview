<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Preview - 设计规范预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .sidebar-subtitle {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        /* 分类筛选 */
        .category-filter {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 4px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            text-align: center;
            min-width: 0;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: #fff;
        }

        /* 品牌列表 */
        .brand-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .brand-list::-webkit-scrollbar {
            width: 6px;
        }

        .brand-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        .brand-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .brand-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        .brand-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-color, #667eea);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .brand-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(4px);
        }

        .brand-item:hover::before {
            opacity: 1;
        }

        .brand-item.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }

        .brand-item.active::before {
            opacity: 1;
        }

        .brand-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .brand-item-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .brand-item-colors {
            display: flex;
            gap: 4px;
        }

        .brand-item-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .brand-item-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .brand-item-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .brand-item-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .tag-vibrant { background: rgba(255,99,132,0.2); color: #ff6384; }
        .tag-modern { background: rgba(54,162,235,0.2); color: #36a2eb; }
        .tag-minimal { background: rgba(75,192,192,0.2); color: #4bc0c0; }
        .tag-luxury { background: rgba(255,206,86,0.2); color: #ffce56; }
        .tag-tech { background: rgba(153,102,255,0.2); color: #9966ff; }
        .tag-warm { background: rgba(255,159,64,0.2); color: #ff9f40; }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部工具栏 */
        .toolbar {
            height: 60px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .current-brand {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .current-brand-colors {
            display: flex;
            gap: 4px;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 4px;
            gap: 4px;
        }

        .mode-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-btn:hover {
            color: #fff;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .external-link {
            padding: 8px 16px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .external-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .download-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 预览区域 */
        .preview-container {
            flex: 1;
            position: relative;
            background: #000;
        }

        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
        }

        .preview-placeholder-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .preview-placeholder-text {
            font-size: 1.1rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>

        let currentBrand = null;

        // 生成品牌列表
        function renderBrandList() {
            const list = document.getElementById('brandList');
            list.innerHTML = '';

            const filteredBrands = currentFilter === 'all' 
                ? brands 
                : brands.filter(b => b.category === currentFilter || b.tags.includes(currentFilter));

            filteredBrands.forEach(brand => {
                const item = document.createElement('div');
                item.className = 'brand-item';
                item.style.setProperty('--accent-color', brand.colors[0]);
                if (currentBrand && currentBrand.name === brand.name) {
                    item.classList.add('active');
                }

                const colorsHtml = brand.colors.map(c => 
                    `<span class="brand-item-color" style="background: ${c};"></span>`
                ).join('');

                const tagsHtml = brand.tags.map(tag => 
                    `<span class="brand-item-tag tag-${tag}">${getTagLabel(tag)}</span>`
                ).join('');

                item.innerHTML = `
                    <div class="brand-item-header">
                        <span class="brand-item-name">${brand.name}</span>
                        <div class="brand-item-colors">${colorsHtml}</div>
                    </div>
                    <div class="brand-item-desc">${brand.desc}</div>
                    <div class="brand-item-tags">${tagsHtml}</div>
                `;

                item.addEventListener('click', () => selectBrand(brand));
                list.appendChild(item);
            });
        }

        function getTagLabel(tag) {
            const labels = {
                vibrant: '鲜活',
                modern: '现代',
                minimal: '极简',
                luxury: '奢华',
                tech: '科技',
                warm: '温暖'
            };
            return labels[tag] || tag;
        }

        // 选择品牌
        function selectBrand(brand) {
            currentBrand = brand;
            
            // 更新列表激活状态
            document.querySelectorAll('.brand-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // 更新工具栏
            document.getElementById('currentBrand').textContent = brand.name;
            document.getElementById('currentBrandColors').innerHTML = brand.colors.map(c => 
                `<span class="brand-item-color" style="background: ${c};"></span>`
            ).join('');

            // 更新外部链接
            updateExternalLink();

            // 加载预览
            loadPreview();
        }

        // 加载预览
        function loadPreview() {
            if (!currentBrand) return;

            const frame = document.getElementById('previewFrame');
            const placeholder = document.getElementById('placeholder');
            const folderName = getBrandFolderName(currentBrand.name);
            const modeSuffix = currentMode === 'dark' ? '-dark' : '';
            
            frame.src = `design-md/${folderName}/preview${modeSuffix}.html`;
            frame.style.display = 'block';
            placeholder.style.display = 'none';
        }

        // 更新外部链接
        function updateExternalLink() {
            if (!currentBrand) return;
            
            const folderName = getBrandFolderName(currentBrand.name);
            const modeSuffix = currentMode === 'dark' ? '-dark' : '';
            document.getElementById('externalLink').href = `design-md/${folderName}/preview${modeSuffix}.html`;
        }

        // 分类筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderBrandList();
            });
        });

        // 模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                updateExternalLink();
                loadPreview();
            });
        });

        // 从URL参数获取品牌和模式
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                brand: params.get('brand'),
                mode: params.get('mode') || 'light'

        }

        // 下载设计规范压缩包
        async function downloadDesignPackage() {
            if (!currentBrand) {
                alert('请先选择一个品牌');
                return;
            }

            const downloadBtn = document.getElementById('downloadBtn');
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '⏳ 打包中...';
            downloadBtn.disabled = true;

            try {
                const zip = new JSZip();
                const folderName = getBrandFolderName(currentBrand.name);
                const brandFolder = zip.folder(folderName);

                // 获取文件内容
                const files = [
                    { name: 'DESIGN.md', path: `design-md/${folderName}/DESIGN.md` },
                    { name: 'preview.html', path: `design-md/${folderName}/preview.html` },
                    { name: 'preview-dark.html', path: `design-md/${folderName}/preview-dark.html` }
                ];

                for (const file of files) {
                    try {
                        const response = await fetch(file.path);
                        if (response.ok) {
                            const content = await response.text();
                            brandFolder.file(file.name, content);
                        }
                    } catch (e) {
                        console.warn(`无法获取文件: ${file.path}`, e);
                    }
                }

                // 生成压缩包
                const content = await zip.generateAsync({ 
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });

                // 下载文件
                saveAs(content, `${folderName}-design.zip`);

                downloadBtn.innerHTML = '✅ 完成';
                setTimeout(() => {
                    downloadBtn.innerHTML = originalText;
                    downloadBtn.disabled = false;
                }, 2000);

            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败，请重试');
                downloadBtn.innerHTML = originalText;
                downloadBtn.disabled = false;
            }
        }

        // 初始化
        const urlParams = getUrlParams();
        if (urlParams.brand) {
            const brand = findBrandByFolder(urlParams.brand);
            if (brand) {
                currentBrand = brand;
                currentMode = urlParams.mode;
                
                // 更新模式按钮状态
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === currentMode) {
                        btn.classList.add('active');
                    }
                });
                
                // 更新工具栏
                document.getElementById('currentBrand').textContent = brand.name;
                document.getElementById('currentBrandColors').innerHTML = brand.colors.map(c => 
                    `<span class="brand-item-color" style="background: ${c};"></span>`
                ).join('');
                
                // 加载预览
                updateExternalLink();
                loadPreview();
            }
        }
        
        renderBrandList();
        
        // 如果有指定品牌，高亮它
        if (currentBrand) {
            setTimeout(() => {
                const items = document.querySelectorAll('.brand-item');
                items.forEach(item => {
                    if (item.querySelector('.brand-item-name').textContent === currentBrand.name) {
                        item.classList.add('active');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 100);
        }
